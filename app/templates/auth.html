<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Simon Kola</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #111111;
            --border-color: #222222;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #ffffff;
            --error-color: #ff4444;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 0.8rem 0;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color var(--transition);
        }

        input:focus {
            border-color: var(--text-main);
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 68, 68, 0.1);
            padding: 0.8rem;
            border-left: 2px solid var(--error-color);
        }

        .auth-btn {
            width: 100%;
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 1rem;
            transition: opacity 0.2s;
        }

        .auth-btn:hover {
            opacity: 0.9;
        }

        .switch-mode {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .switch-mode a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .switch-mode a:hover {
            text-decoration: underline;
        }

        /* Subtle background element */
        .decoration {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="decoration"></div>
        <header>
            <h1>{{ 'Login' if mode == 'login' else 'Join' }}</h1>
            <p class="subtitle">Simon Kola Admin Panel</p>
        </header>

        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}

        <form method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required>
            </div>
            
            <button type="submit" class="auth-btn">
                {{ 'Sign In' if mode == 'login' else 'Create Account' }}
            </button>
        </form>

        <div class="switch-mode">
            {% if mode == 'login' %}
                Non hai un account? <a href="{{ url_for('auth.register') }}">Registrati</a>
            {% else %}
                Hai già un account? <a href="{{ url_for('auth.login') }}">Accedi</a>
            {% endif %}
        </div>
    </div>

</body>
</html>
